# PointCloud SSL pretraining config (ModelNet40, view-invariant VICReg).
meta:
  seed: 0
  ckpt_dir: UPDATEME/checkpoints/pointcloud/dev
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/modelnet40/modelnet40_ply_hdf5_2048
  n_points: 1024
  n_classes: 40
  batch_size: 128
  num_workers: 8
  rotate: none            # so3 (full view-invariance) | z (azimuth only) | none
  jitter: 0.01
  scale_lo: 0.8
  scale_hi: 1.25
sweep:
  param_grid:
    data.rotate: [none, z, so3]
model:
  in_channels: 3
  out_dim: 1024
  n_centers: 64       # nb de patches (FPS)
  k_neighbors: 32     # points par patch (KNN)
  d_model: 384        # dim interne du Transformer
  n_heads: 6          # têtes d'attention
  n_layers: 12        # profondeur du Transformer
logging:
  log_wandb: true
  wandb_group:
  eval_every: 5
optim:
  epochs: 60
  lr: 1.0e-3
  weight_decay: 1.0e-6
